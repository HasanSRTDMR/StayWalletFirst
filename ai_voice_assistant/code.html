<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StayWallet AI Voice Assistant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f45b3",
                        "accent-gold": "#d4af37",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .orb-glow {
            background: radial-gradient(circle, rgba(15, 69, 179, 0.4) 0%, rgba(212, 175, 55, 0.1) 50%, transparent 70%);
        }
        .voice-wave {
            background: linear-gradient(90deg, #0f45b3 0%, #d4af37 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<header class="flex items-center justify-between p-6 z-10">
<button class="flex items-center justify-center size-10 rounded-full bg-slate-800/50 text-slate-100 hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex items-center gap-2">
<span class="size-2 rounded-full bg-accent-gold shadow-[0_0_8px_#d4af37]"></span>
<h2 class="text-sm font-semibold tracking-widest uppercase text-slate-400">Concierge Live</h2>
</div>
<button class="flex items-center justify-center size-10 rounded-full bg-slate-800/50 text-slate-100">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Content -->
<main class="flex flex-1 flex-col items-center justify-between px-6 pb-12">
<!-- Greeting & Transcript -->
<div class="w-full text-center mt-4">
<h1 class="text-2xl md:text-3xl font-bold leading-tight mb-4">
                    Hello Mr. Alexander,<br/>
<span class="text-primary dark:text-primary">how can I help you today?</span>
</h1>
<div class="mx-auto max-w-md px-4 py-3 rounded-2xl bg-slate-800/30 border border-slate-700/50 backdrop-blur-sm">
<p class="text-slate-400 italic text-sm">"I'd like to see my current room charges..."</p>
</div>
</div>
<!-- AI Orb Visualization -->
<div class="relative flex items-center justify-center w-full max-w-sm aspect-square">
<!-- Glowing Background -->
<div class="absolute inset-0 orb-glow animate-pulse"></div>
<!-- Center Orb -->
<div class="relative z-0 size-48 rounded-full bg-gradient-to-br from-primary to-accent-gold p-[2px] shadow-[0_0_50px_rgba(15,69,179,0.3)]">
<div class="flex h-full w-full items-center justify-center rounded-full bg-background-dark overflow-hidden relative">
<!-- Abstract Wave Pattern Inside -->
<div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
<div class="flex gap-1.5 items-end justify-center h-16">
<div class="w-1.5 h-8 bg-primary rounded-full animate-[bounce_1s_infinite]"></div>
<div class="w-1.5 h-14 bg-primary rounded-full animate-[bounce_1.2s_infinite]"></div>
<div class="w-1.5 h-10 bg-accent-gold rounded-full animate-[bounce_0.8s_infinite]"></div>
<div class="w-1.5 h-16 bg-primary rounded-full animate-[bounce_1.1s_infinite]"></div>
<div class="w-1.5 h-12 bg-accent-gold rounded-full animate-[bounce_0.9s_infinite]"></div>
</div>
</div>
</div>
<!-- Floating Decorative Elements -->
<div class="absolute top-10 left-10 size-3 rounded-full bg-primary/40 blur-sm"></div>
<div class="absolute bottom-12 right-8 size-4 rounded-full bg-accent-gold/30 blur-sm"></div>
</div>
<!-- Suggested Commands (Horizontal Scroll) -->
<div class="w-full max-w-xl">
<p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 text-center">Suggested Actions</p>
<div class="flex gap-3 overflow-x-auto pb-4 no-scrollbar snap-x">
<button class="flex-none snap-start flex items-center gap-3 px-5 py-3 rounded-xl bg-slate-800/40 border border-slate-700/50 hover:bg-primary/20 hover:border-primary/50 transition-all group">
<span class="material-symbols-outlined text-accent-gold group-hover:scale-110 transition-transform">restaurant</span>
<span class="text-sm font-medium">Book Mirage Grill</span>
</button>
<button class="flex-none snap-start flex items-center gap-3 px-5 py-3 rounded-xl bg-slate-800/40 border border-slate-700/50 hover:bg-primary/20 hover:border-primary/50 transition-all group">
<span class="material-symbols-outlined text-accent-gold group-hover:scale-110 transition-transform">account_balance_wallet</span>
<span class="text-sm font-medium">Check balance</span>
</button>
<button class="flex-none snap-start flex items-center gap-3 px-5 py-3 rounded-xl bg-slate-800/40 border border-slate-700/50 hover:bg-primary/20 hover:border-primary/50 transition-all group">
<span class="material-symbols-outlined text-accent-gold group-hover:scale-110 transition-transform">meeting_room</span>
<span class="text-sm font-medium">Unlock room</span>
</button>
<button class="flex-none snap-start flex items-center gap-3 px-5 py-3 rounded-xl bg-slate-800/40 border border-slate-700/50 hover:bg-primary/20 hover:border-primary/50 transition-all group">
<span class="material-symbols-outlined text-accent-gold group-hover:scale-110 transition-transform">explore</span>
<span class="text-sm font-medium">Find tours</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="border-t border-slate-800 bg-background-dark/80 backdrop-blur-lg px-6 py-4">
<div class="flex items-center justify-around max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
</a>
<a class="flex flex-col items-center justify-center size-14 -mt-10 rounded-full bg-primary text-white shadow-lg shadow-primary/40 ring-4 ring-background-dark" href="#">
<span class="material-symbols-outlined text-2xl">mic</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Profile</span>
</a>
</div>
</nav>
<!-- Background Image/Pattern -->
<div class="absolute inset-0 -z-10 opacity-10">
<div class="absolute inset-0 bg-gradient-to-b from-primary/20 to-transparent"></div>
<img class="w-full h-full object-cover grayscale brightness-50" data-alt="Luxurious dark hotel lobby interior" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbeb4ViQqou-PxiMwcGeAgYT4_erV7Q5czLmnzvFMRYPyUGSBh94NjYM928EX67i5RnwAasNcGuq4wMyVDQSx9txQ1KGqBXF4Bp5CEDErLZst_bNyoUlp6Es9hchuYjaAxI59Y4TUXmKmpwWgI8tkq1RIIJHKXrj6ZrP_tEZIM6EhckZzCCl62EICto0NNH2r_RDQm27DewDiYjxHoUNpEfvCY3fOEuOW7Rwke4JFda6qduoNaSVObwhitxaz6pRWk3FFTOCjaK7LW"/>
</div>
</div>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
