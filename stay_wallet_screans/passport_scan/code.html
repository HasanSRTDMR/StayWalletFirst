<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StayWallet - Passport Check-in</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f45b3",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark">
<!-- Header Section -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between z-20">
<div class="flex size-12 shrink-0 items-center justify-start cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100" style="font-size: 24px;">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">StayWallet</h2>
</header>
<!-- Instruction Text -->
<div class="z-20 px-4 pt-4 text-center">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight pb-1">Scan your Passport</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Align your document within the frame</p>
</div>
<!-- Camera Viewfinder Section -->
<div class="relative flex-1 flex items-center justify-center p-6 z-10">
<!-- Mock Viewfinder Background -->
<div class="absolute inset-0 bg-slate-200 dark:bg-slate-900 overflow-hidden m-4 rounded-xl border-2 border-slate-300 dark:border-slate-800 shadow-2xl">
<div class="w-full h-full bg-gradient-to-br from-slate-400/20 via-slate-500/10 to-slate-600/20 flex items-center justify-center" data-alt="Abstract camera viewfinder dark gradient pattern">
<!-- Passport Overlay Frame -->
<div class="relative w-full max-w-sm aspect-[3/4] border-2 border-primary rounded-xl flex flex-col items-center justify-center overflow-hidden">
<!-- Corner Accents -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-primary rounded-tl-xl -m-[2px]"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-primary rounded-tr-xl -m-[2px]"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-primary rounded-bl-xl -m-[2px]"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-primary rounded-br-xl -m-[2px]"></div>
<!-- Scanning Line -->
<div class="w-full h-1 bg-primary/40 shadow-[0_0_15px_rgba(15,69,179,0.8)] opacity-50"></div>
<!-- Guide Placeholder -->
<div class="mt-8 opacity-20 flex flex-col items-center gap-4">
<span class="material-symbols-outlined text-primary" style="font-size: 80px;">badge</span>
<span class="text-xs font-bold uppercase tracking-widest text-primary">ID Document Area</span>
</div>
</div>
</div>
</div>
</div>
<!-- Camera Controls -->
<div class="z-20 flex flex-col gap-6 p-6 bg-background-light dark:bg-background-dark/80 backdrop-blur-md pb-10">
<div class="flex items-center justify-center gap-10">
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">image</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-20 bg-primary text-white shadow-lg shadow-primary/40 active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-size: 40px; font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">flash_on</span>
</button>
</div>
<div class="flex w-full">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 flex-1 bg-primary text-white text-lg font-bold leading-normal tracking-[0.015em] shadow-md hover:bg-primary/90 transition-colors">
<span class="truncate">Take Photo</span>
</button>
</div>
</div>
<!-- Bottom Safe Area Spacer -->
<div class="h-4 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
