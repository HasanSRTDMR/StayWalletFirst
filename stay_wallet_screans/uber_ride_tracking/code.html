<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StayWallet - Ride Tracking</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f45b3",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-slate-200 dark:border-slate-800 z-10">
<div class="flex items-center gap-3">
<div class="text-slate-900 dark:text-slate-100 flex items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">StayWallet</h2>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">share</span>
</button>
<button class="text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Live Map Section -->
<div class="relative flex-1 bg-slate-200 dark:bg-slate-900 overflow-hidden">
<!-- Simulated Map Background -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center" data-alt="Dark stylized city map with navigation routes" data-location="San Francisco" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB0h_gwV79hv2DbH6qVin4SVX-WbrkihnfziX66C_hQdv59JUJwWmPdrnwoJNvz9Gj7a3tprqqZwHhG44pjs8MJzVPEWEDJi4udBIpBt44k6QsGPWtM8MqOJgW0wt04a0O-RA3isucyCYdFWOgUxbAk28ZuUZje4xfKsvjCqEPLQWnK8RcCpW_o7NvnkSz45F_vHw8026iCEfyttr9_7XhUt8f101H0scKOBU21x_LhowZ3fCPzHy6YcQXKcbf169FevD9qcJPv0J4x')">
</div>
<!-- Map Overlay UI -->
<div class="absolute inset-0 pointer-events-none">
<!-- Car Marker -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="bg-primary text-white p-2 rounded-full shadow-xl ring-4 ring-primary/20">
<span class="material-symbols-outlined filled-icon">local_taxi</span>
</div>
<div class="mt-2 bg-background-dark/90 text-white text-[10px] px-2 py-0.5 rounded-full border border-slate-700">
                        3 min
                    </div>
</div>
<!-- Destination Marker -->
<div class="absolute top-1/3 left-1/3 -translate-x-1/2 -translate-y-1/2">
<div class="bg-red-500 text-white p-1.5 rounded-full shadow-lg">
<span class="material-symbols-outlined text-sm filled-icon">location_on</span>
</div>
</div>
</div>
<!-- Floating Map Actions -->
<div class="absolute right-4 top-4 flex flex-col gap-2">
<button class="w-10 h-10 bg-white dark:bg-slate-800 rounded-lg shadow-lg flex items-center justify-center text-slate-700 dark:text-slate-200">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</div>
<!-- Bottom Sheet Tracking Info -->
<div class="flex flex-col items-stretch bg-background-light dark:bg-background-dark rounded-t-xl shadow-2xl border-t border-slate-200 dark:border-slate-800 z-20">
<!-- Drag Handle -->
<button class="flex h-6 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</button>
<!-- Status Header -->
<div class="px-6 py-2 border-b border-slate-200 dark:border-slate-800">
<h4 class="text-primary dark:text-blue-400 text-base font-bold leading-normal tracking-tight text-center">
                    Driver is arriving in 3 mins
                </h4>
</div>
<!-- Driver Card -->
<div class="p-6">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="relative">
<img alt="Driver" class="w-16 h-16 rounded-full object-cover border-2 border-primary/20" data-alt="Close up portrait of a professional driver" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxyI95E0UhtNGjN7dD1TCQwp8dB3VVRfG4es7ZvHYlbcrr8EOgArnb669PVhysu5y3M4oDsqKPn_iBQqcJIB0Vw8zkmCS0zvM-YwjM5xhyTPoLYZcuFG8cOyO2BZavELbjCPzoUrr2l5E-3JzqSFLs6PrK5lTCQ35fGwnTMxTgFd5Z8Ptu64U_e9cbiZA5LpsFdnOXw6NFCTCOVXY9Gx3cxcNOVBBjduSLQ5VCkyu5gFmaIlE4vY3hP9h3O28FYoPtedF6Qf_8YahN"/>
<div class="absolute -bottom-1 -right-1 bg-yellow-400 text-slate-900 rounded-full px-1.5 py-0.5 flex items-center text-[10px] font-bold border-2 border-background-dark">
                                4.9 <span class="material-symbols-outlined text-[10px] filled-icon ml-0.5">star</span>
</div>
</div>
<div>
<p class="text-xl font-bold dark:text-slate-100">Marco Rossi</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Toyota Camry • <span class="text-slate-900 dark:text-slate-200 font-semibold tracking-wider">ABC-1234</span></p>
</div>
</div>
<div class="flex gap-3">
<button class="w-12 h-12 rounded-full bg-primary/10 dark:bg-primary/20 text-primary flex items-center justify-center">
<span class="material-symbols-outlined">call</span>
</button>
<button class="w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 flex items-center justify-center">
<span class="material-symbols-outlined">chat_bubble</span>
</button>
</div>
</div>
<!-- Ride Safety/Message Bar -->
<div class="mt-6 flex items-center gap-3 bg-slate-100 dark:bg-slate-800/50 p-3 rounded-xl">
<span class="material-symbols-outlined text-primary">security</span>
<p class="text-sm text-slate-600 dark:text-slate-400 flex-1">Safety PIN: <span class="font-mono font-bold text-slate-900 dark:text-slate-100 ml-1">4812</span></p>
<button class="text-primary text-sm font-bold">Details</button>
</div>
<!-- Action Buttons -->
<div class="mt-6 flex gap-3">
<button class="flex-1 bg-primary text-white font-bold py-3.5 rounded-xl hover:bg-primary/90 transition-colors">
                        Trip Details
                    </button>
<button class="px-6 border border-slate-300 dark:border-slate-700 text-red-500 font-semibold py-3.5 rounded-xl">
                        Cancel
                    </button>
</div>
</div>
</div>
<!-- Navigation Bar -->
<nav class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium leading-normal">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined filled-icon">directions_car</span>
<p class="text-[10px] font-medium leading-normal">Trips</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<p class="text-[10px] font-medium leading-normal">Wallet</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium leading-normal">Profile</p>
</a>
</nav>
</div>
</body></html>
