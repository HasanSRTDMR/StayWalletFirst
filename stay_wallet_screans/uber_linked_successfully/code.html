</div>
</div>
</div>
</div>

<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pt-2 text-center max-w-xs">Your Uber account has been successfully synced with StayWallet for seamless travel tracking.</p>

<!-- Data Item 1 -->
<div class="flex items-center gap-4 p-4 rounded-xl bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800">
<div class="flex size-10 items-center justify-center rounded-lg bg-primary/20 text-primary">

</div>

</div>
</div>
