</label>
<label class="flex items-center gap-x-4 py-4 px-2 border-b border-slate-200 dark:border-slate-800 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800/50 rounded-lg transition-colors">

<label class="flex items-center gap-x-4 py-4 px-2 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800/50 rounded-lg transition-colors">
